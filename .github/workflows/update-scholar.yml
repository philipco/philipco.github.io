name: Update Scholar stats

on:
  schedule:
    - cron: "0 6 * * 0" # every Sunday at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scholar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install scholarly

      - name: Fetch Google Scholar stats
        run: python scripts/update_scholar.py

      - name: Commit updated scholar stats
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update Google Scholar stats"
          file_pattern: public/scholar.json
